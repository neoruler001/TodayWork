name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write   # keystore를 repo에 커밋하기 위해 필요

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure stable debug keystore
        run: |
          KEYSTORE=".github/debug.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            echo "Keystore not in repo — generating and committing..."
            mkdir -p .github
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            git config user.email "github-actions@github.com"
            git config user.name "GitHub Actions"
            git add "$KEYSTORE"
            git commit -m "chore: add stable debug keystore for consistent APK signing"
            git push
            echo "Keystore committed to repo"
          else
            echo "Keystore already in repo — reusing"
          fi
          mkdir -p ~/.android
          cp "$KEYSTORE" ~/.android/debug.keystore

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodayWork-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

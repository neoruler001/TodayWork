<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
    <!-- 달력 본체 그림자 -->
    <filter id="card-shadow" x="-8%" y="-5%" width="118%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000033"/>
    </filter>
    <!-- 링 바인더 입체감 -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="40%" stop-color="#BBBBBB"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <!-- 달력 하단 적층 표현 -->
    <linearGradient id="stack-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DDDDDD"/>
      <stop offset="100%" stop-color="#CCCCCC"/>
    </linearGradient>
    <!-- 텍스트 폰트 -->
    <style>
      .title { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; font-weight: 800; }
    </style>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- 1. 오렌지 배경 -->
    <rect width="512" height="512" fill="#E8712A"/>

    <!-- 2. 우하단 반짝이 별 -->
    <path d="M 462 420 L 468 436 L 462 452 L 456 436 Z M 448 436 L 462 430 L 476 436 L 462 442 Z"
          fill="#FFFFFF" opacity="0.85"/>

    <!-- 3. 달력 하단 적층(페이지 두께) 표현 -->
    <rect x="96" y="422" width="320" height="10" rx="4" fill="#CCCCCC"/>
    <rect x="100" y="430" width="312" height="9" rx="4" fill="#D5D5D5"/>
    <rect x="104" y="438" width="304" height="8" rx="4" fill="#DEDEDE"/>
    <rect x="108" y="445" width="296" height="7" rx="4" fill="#E4E4E4"/>
    <rect x="112" y="451" width="288" height="7" rx="4" fill="#EAEAEA"/>

    <!-- 4. 달력 본체 흰색 카드 -->
    <rect x="88" y="108" width="336" height="320" rx="24" ry="24"
          fill="#FFFFFF" filter="url(#card-shadow)"/>

    <!-- 5. 좌상단 클립보드+연필 아이콘 (작게) -->
    <!-- 클립보드 몸통 -->
    <rect x="114" y="152" width="38" height="46" rx="5" fill="none" stroke="#C0C0C0" stroke-width="3"/>
    <!-- 클립보드 클립 -->
    <rect x="124" y="146" width="18" height="10" rx="3" fill="none" stroke="#C0C0C0" stroke-width="2.5"/>
    <!-- 체크박스 줄 -->
    <rect x="120" y="168" width="8" height="7" rx="1.5" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    <rect x="120" y="181" width="8" height="7" rx="1.5" fill="none" stroke="#C0C0C0" stroke-width="2"/>
    <!-- 체크 표시 -->
    <polyline points="121,171 124,175 128,168" fill="none" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 연필 -->
    <line x1="135" y1="186" x2="148" y2="170" stroke="#C0C0C0" stroke-width="3" stroke-linecap="round"/>
    <polygon points="148,170 154,165 155,172" fill="#C0C0C0"/>

    <!-- 6. 하단 시계+톱니 아이콘 -->
    <!-- 시계 원 -->
    <circle cx="238" cy="394" r="17" fill="none" stroke="#C0C0C0" stroke-width="3"/>
    <line x1="238" y1="387" x2="238" y2="394" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="238" y1="394" x2="245" y2="394" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 톱니 (기어) 작은 원 -->
    <circle cx="263" cy="405" r="10" fill="none" stroke="#C0C0C0" stroke-width="2.5"/>
    <circle cx="263" cy="405" r="4" fill="#C0C0C0"/>
    <!-- 톱니 돌기 -->
    <rect x="260" y="393" width="6" height="4" rx="1" fill="#C0C0C0"/>
    <rect x="260" y="413" width="6" height="4" rx="1" fill="#C0C0C0"/>
    <rect x="269" y="402" width="4" height="6" rx="1" fill="#C0C0C0"/>
    <rect x="250" y="402" width="4" height="6" rx="1" fill="#C0C0C0"/>

    <!-- 7. 중앙 텍스트 "마님" / "일정" -->
    <text x="280" y="272" class="title" font-size="120" fill="#3D4454" text-anchor="middle">마님</text>
    <text x="280" y="390" class="title" font-size="120" fill="#3D4454" text-anchor="middle">일정</text>

    <!-- 8. 링 바인더 3개 (상단) -->
    <!-- 링 받침대 막대 (카드 위에 걸쳐진 가로 바) -->
    <rect x="142" y="100" width="228" height="22" rx="8" fill="#BBBBBB"/>

    <!-- 링 1 (왼쪽) -->
    <ellipse cx="186" cy="112" rx="16" ry="22" fill="url(#ring-grad)" stroke="#999" stroke-width="2"/>
    <ellipse cx="186" cy="112" rx="8" ry="14" fill="#E8712A"/>

    <!-- 링 2 (가운데) -->
    <ellipse cx="256" cy="112" rx="16" ry="22" fill="url(#ring-grad)" stroke="#999" stroke-width="2"/>
    <ellipse cx="256" cy="112" rx="8" ry="14" fill="#E8712A"/>

    <!-- 링 3 (오른쪽) -->
    <ellipse cx="326" cy="112" rx="16" ry="22" fill="url(#ring-grad)" stroke="#999" stroke-width="2"/>
    <ellipse cx="326" cy="112" rx="8" ry="14" fill="#E8712A"/>
  </g>
</svg>

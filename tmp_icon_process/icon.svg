<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 외곽 둥근 사각형 클립 패스 (ic_launcher용) -->
    <clipPath id="squircle-clip">
      <rect width="512" height="512" rx="105" ry="105" />
    </clipPath>
    <!-- 접힌 종이 그림자 효과 -->
    <filter id="page-fold-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-4" dy="-4" stdDeviation="5" flood-color="#7B8CD4" flood-opacity="0.3" />
    </filter>
    <filter id="sparkle-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 웹폰트 Noto Sans KR 로드 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&amp;display=swap');
      .title-text {
        font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        font-weight: 700;
        fill: #2C3038;
        font-size: 82px;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <!-- 전체 영역을 클립패스로 마스킹 (ic_launcher용) -->
  <g clip-path="url(#squircle-clip)">
    <!-- 1. 배경색 (라벤더 블루) -->
    <rect width="512" height="512" fill="#BAC7F5" />

    <!-- 2. 우하단 반짝이 데코 (종이 들춰진 아래 배경에 위치) -->
    <!-- 주 별 -->
    <path d="M 445,425 Q 445,440 430,440 Q 445,440 445,455 Q 445,440 460,440 Q 445,440 445,425 Z" 
          fill="#FFFFFF" opacity="0.9" filter="url(#sparkle-glow)" />
    <!-- 보조 작은 별 -->
    <path d="M 465,405 Q 465,412 458,412 Q 465,412 465,419 Q 465,412 472,412 Q 465,412 465,405 Z" 
          fill="#FFFFFF" opacity="0.8" />

    <!-- 3. 본체 흰색 종이 카드 -->
    <!-- 우하단을 접힌 곡선 모양으로 깎아낸 패스 -->
    <path d="M 48,160 
             Q 48,100 108,100 
             L 404,100 
             Q 464,100 464,160 
             L 464,360 
             Q 464,410 410,430 
             Q 360,450 360,460 
             L 108,460 
             Q 48,460 48,400 
             Z" 
          fill="#FFFFFF" />

    <!-- 4. 접혀 올라간 종이 꼬리 (입체 표현) -->
    <!-- 흰색에서 옅은 라벤더로 변하는 그라데이션 및 그림자 추가 -->
    <path d="M 360,460 
             Q 410,430 464,360 
             Q 430,425 410,445 
             Q 385,460 360,460 
             Z" 
          fill="#F0F3FD" 
          filter="url(#page-fold-shadow)" />
    <!-- 접힌 경계면 흰색 하이라이트 레이어 -->
    <path d="M 360,460 Q 410,430 464,360 Q 425,415 360,460 Z" fill="#FFFFFF" opacity="0.5" />

    <!-- 5. 상단 흰색 바인더 클립 -->
    <rect x="132" y="70" width="248" height="28" rx="14" fill="#FFFFFF" />

    <!-- 6. 중앙 텍스트 -->
    <text x="256" y="245" class="title-text" text-anchor="middle">마님</text>
    <text x="256" y="355" class="title-text" text-anchor="middle">일정</text>
  </g>
</svg>
